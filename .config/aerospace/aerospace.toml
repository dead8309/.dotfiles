# Basic settings
start-at-login = true
after-startup-command = []

# Layouts
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 10
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Key mapping
[key-mapping]
preset = 'qwerty'

# Gaps
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 30
outer.right = 30
outer.top = 30
outer.bottom = 40

# Main keybindings
[mode.main.binding]
# Terminal
alt-shift-f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
alt-f = 'fullscreen'

# Layout switching
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus movement
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-s = 'workspace s'
alt-w = 'workspace w'
alt-m = 'workspace m'

# Move to workspaces
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-s = ['move-node-to-workspace s', 'workspace s']
alt-shift-w = ['move-node-to-workspace w', 'workspace w']
alt-shift-m = ['move-node-to-workspace m', 'workspace m']

# Window rules for floating
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'


[[on-window-detected]]
if.app-name-regex-substring = 'AppCleaner'
run = 'layout floating'
